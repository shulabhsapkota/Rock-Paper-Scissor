<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
</head>
<body>

  <div class="container">
    <h1>Rock Paper Scissors</h1>

    <p>Choose your move:</p>

    <div class="choice">
      <button>Rock</button>
      <button>Paper</button>
      <button>Scissors</button>
    </div>

    <div class="input">
      <p>Your choice</p>
      <p>Computer's choice</p>
    </div>

    <div class="winner">
      <h2>Winner:</h2>
    </div>

    <div class="score">
      <p>Your Score : 0</p>
      <p>Computer's Score : 0</p>
    </div>
  </div>

</body>
</html>
